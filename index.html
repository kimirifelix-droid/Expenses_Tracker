<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Budget Tracker</h1>
        <p>Track your income and expenses in one place.</p>
    </header>

    <main>
        <section id="add-expense-section">
            <h2>Add New Expense</h2>
            
            <div class="input-group">
                <label for="expense-name">Expense Name:</label>
                <input type="text" id="expense-name" placeholder="e.g., Groceries">
            </div>

            <div class="input-group">
                <label for="expense-amount">Amount ($):</label>
                <input type="number" id="expense-amount" placeholder="0.00">
            </div>

            <div class="input-group">
                <label for="expense-category">Category:</label>
                <select id="expense-category">
                    <option value="">-- Select Category --</option>
                    <option value="food">Food</option>
                    <option value="rent">Rent/Bills</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="transport">Transport</option>
                </select>
            </div>

            <button type="button">Add Expense</button>
        </section>

        <section id="expenses-display-section">
            <h2>Your Expenses</h2>
            <p class="placeholder-text">No expenses added yet.</p>
        </section>
    </main>

</body>
</html>
